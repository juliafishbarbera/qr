<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code Generator</title>
    <script src="qrcode.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="stylesheet.css">
  </head>
  <body>
    <button class="dark-mode-toggle" onclick="toggleDarkMode()">Dark Mode</button>
    
    <h1>QR Code Generator</h1>
    <p>Enter text or URL to generate a QR code.</p>
    
    <div class="input-row">
      <input
        id="text"
        type="text"
        value="https://qr.fishcat.fish/"
      />
      <select id="correctionLevel">
        <option value="L">Low (L)</option>
        <option value="M">Medium (M)</option>
        <option value="Q">Quartile (Q)</option>
        <option value="H">High (H)</option>
        <option value="AUTO" selected>Auto</option>
      </select>
    </div>
    <p id="urlWarning" class="input-warning" hidden>
      This looks like a website. Add `https://` if you want scanners to open it as a URL.
    </p>

    <details class="advanced-options">
      <summary>Advanced</summary>
      <div class="advanced-options__grid">
        <label>
          <span>Module shape</span>
          <select id="moduleShape">
            <option value="square" selected>Squares</option>
            <option value="circle">Circles</option>
          </select>
        </label>
        <label>
          <span>Foreground color</span>
          <input id="foregroundColor" type="color" value="#000000" />
        </label>
        <label>
          <span>Background color</span>
          <input id="backgroundColor" type="color" value="#ffffff" />
        </label>
        <label>
          <span>Output size</span>
          <select id="qrSize">
            <option value="modules">Module count</option>
            <option value="192">192 px</option>
            <option value="256" selected>256 px</option>
            <option value="320">320 px</option>
            <option value="384">384 px</option>
            <option value="512">512 px</option>
          </select>
        </label>
        <label class="advanced-options__checkbox">
          <input id="transparentBackground" type="checkbox" />
          <span>Transparent background</span>
        </label>
        <div class="advanced-options__actions">
          <button id="resetAdvanced" type="button" hidden>Reset</button>
        </div>
      </div>
    </details>
    
    <div id="qrcode"></div>
    
    <div class="qr-meta">
      <p>Version: <span id="qrVersion">-</span> | Modules: <span id="qrModules">-</span></p>
    </div>
    
    <hr>
    
    <div class="download-actions">
      <button id="copyPng">Copy PNG</button>
      <button id="downloadPng">Download PNG</button>
      <button id="downloadSvg">Download SVG</button>
    </div>
    <p class="contact-note">Questions, comments, kudos? Contact <a href="mailto:fish@fishcat.fish">fish@fishcat.fish</a>!</p>
  </body>
</html>
